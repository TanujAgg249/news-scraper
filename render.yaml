# render.yaml — Infrastructure-as-Code for Render deployment
# https://docs.render.com/blueprint-spec

services:
  # --- Backend: FastAPI API server ---
  - type: web
    name: energypulse-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false  # You'll set this manually in the Render dashboard
      - key: DATABASE_URL
        sync: false  # You'll set this to your Supabase Postgres URL in the Render dashboard
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /
